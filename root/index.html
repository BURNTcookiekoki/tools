<!DOCTYPE html>
<html>
<head>
  <title>Free Tools Hub</title>
  <link rel="stylesheet" href="style.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>

  <div class="topbar">
  <input type="text" id="searchBar" placeholder="Search tools... (calculator, qr, text, image)">
</div>

</head>
<body>

<h1>🛠 Free Tools Hub</h1>

<div class="tools">
  <button onclick="showTool('sciCalc')">Scientific</button>
  <button onclick="showTool('calc')">Calculator</button>
  <button onclick="showTool('image')">Image Tools</button>
  <button onclick="showTool('text')">Text Tools</button>
  <button onclick="showTool('qr')">QR Generator</button>
</div>

<!-- Image Tools -->
<div id="image" class="tool" style="display:none;">
  <h2>Image Tools</h2>
  <input type="file" id="upload">
  <br><br>
  <button onclick="resizeImage()">Resize 50%</button>
  <button onclick="blurImage()">Blur</button>
  <button onclick="compressImage()">Compress</button>
  <br><br>
  <canvas id="canvas"></canvas>
</div>

<!-- Text Tools -->
<div id="text" class="tool" style="display:none;">
  <h2>Text Tools</h2>
  <textarea id="textInput" placeholder="Enter text..."></textarea>
  <br>
  <button onclick="wordCount()">Word Count</button>
  <button onclick="toUpper()">UPPERCASE</button>
  <button onclick="toLower()">lowercase</button>
  <p id="textResult"></p>
</div>

<!-- QR Code -->
<div id="qr" class="tool" style="display:none;">
  <h2>QR Code Generator</h2>
  <input id="qrInput" placeholder="Enter text or URL">
  <button onclick="generateQR()">Generate</button>
  <br><br>
  <img id="qrImg">
</div>

<!-- Scientific Calculator -->
<div id="sciCalc" class="tool" style="display:none;">
  <h2>Scientific Calculator</h2>

  <div class="calc-container">
    <input type="text" id="display" disabled>

    <div class="buttons">
    <!-- Top row -->
<div class="buttons casio">

  <!-- SHIFT / MODE -->
  <button onclick="toggleAngle()" id="angleBtn">DEG</button>
  <button onclick="clearDisplay()">AC</button>

  <!-- NAV -->
  <button onclick="deleteLast()">DEL</button>
  <button onclick="append('/')">÷</button>

  <!-- SCI ROW -->
  <button onclick="handleFunc('sin')">sin</button>
  <button onclick="handleFunc('cos')">cos</button>
  <button onclick="handleFunc('tan')">tan</button>
  <button onclick="append('*')">×</button>

  <button onclick="handleFunc('log')">log</button>
  <button onclick="handleFunc('ln')">ln</button>
  <button onclick="append('^')">xʸ</button>
  <button onclick="append('-')">−</button>

  <button onclick="handleFunc('sqrt')">√</button>
  <button onclick="handleFunc('square')">x²</button>
  <button onclick="append('pi')">π</button>
  <button onclick="append('+')">+</button>

  <!-- NUMBERS -->
  <button onclick="append('7')">7</button>
  <button onclick="append('8')">8</button>
  <button onclick="append('9')">9</button>
  <button onclick="append('(')">(</button>

  <button onclick="append('4')">4</button>
  <button onclick="append('5')">5</button>
  <button onclick="append('6')">6</button>
  <button onclick="append(')')">)</button>

  <button onclick="append('1')">1</button>
  <button onclick="append('2')">2</button>
  <button onclick="append('3')">3</button>
  <button onclick="percent()">%</button>

  <button onclick="append('0')">0</button>
  <button onclick="append('.')">.</button>
  <button onclick="calculate()" class="equals">=</button>

</div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
