<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SaaS Tools Hub v3</title>

  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>⚙️ SaaS v3</h2>

    <input id="search" placeholder="Search 2000 tools...">

    <div class="section-title">Categories</div>
    <div id="categories"></div>

    <div class="section-title">System</div>
    <button onclick="showAll()">All Tools</button>
    <button onclick="showType('text')">Text</button>
    <button onclick="showType('math')">Math</button>
    <button onclick="showType('encode')">Encode</button>
    <button onclick="showType('util')">Utilities</button>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <header>
      <h1>Tools Dashboard</h1>
      <p>2000 Real Tools Engine (No Duplicates)</p>
    </header>

    <div id="toolsGrid"></div>

  </main>

</div>

<script src="script.js"></script>
</body>
</html>
