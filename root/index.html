<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SaaS AI Tool Builder v6</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>
</head>

<body>

<div class="app">

  <aside class="sidebar">
    <h2>AI Tool Builder</h2>

    <input id="search" placeholder="Search tools...">

    <div class="section-title">AI Generator</div>

    <textarea id="aiInput" placeholder="Describe tool (e.g. 'text cleaner that removes vowels')"></textarea>
    <button onclick="generateTool()">Generate Tool</button>

    <div class="section-title">Categories</div>
    <div id="categories"></div>

    <button onclick="showAll()">All Tools</button>
    <button onclick="showUserTools()">My Tools</button>

  </aside>

  <main class="main">
    <h1>AI Tool System</h1>
    <div id="grid"></div>
  </main>

</div>

<script src="script.js"></script>
</body>
</html>
